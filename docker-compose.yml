services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ecoshop-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecoshop

  nginx:
    image: nginx:alpine
    container_name: ecoshop-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ecoshop

  node:
    image: node:24-alpine
    container_name: ecoshop-node
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_DEV_SERVER_URL: http://localhost:5173
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    networks:
      - ecoshop

  postgres:
    image: postgres:17-alpine
    container_name: ecoshop-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ecoshop}
      POSTGRES_USER: ${DB_USERNAME:-ecoshop}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoshop -d ecoshop"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecoshop

  redis:
    image: redis:7-alpine
    container_name: ecoshop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ecoshop

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: ecoshop-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - ecoshop

  mailpit:
    image: axllent/mailpit
    container_name: ecoshop-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - ecoshop

networks:
  ecoshop:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  node_modules:
